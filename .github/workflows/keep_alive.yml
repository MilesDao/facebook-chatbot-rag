name: 🏓 Keep Alive - Ping Server

on:
  schedule:
    # Runs every 14 minutes to keep the server awake (Render spins down after 15m)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  ping:
    name: Ping Health Endpoint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 🔍 Ping Server with Retry
        shell: bash
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          if [ -z "$API_BASE_URL" ]; then
            echo "❌ ERROR: API_BASE_URL secret is not set!"
            exit 1
          fi

          HEALTH_URL="${API_BASE_URL}/health"
          MAX_RETRIES=5
          RETRY_DELAY=15
          SUCCESS=false

          echo "🎯 Target: $HEALTH_URL"
          echo "🔁 Max retries: $MAX_RETRIES | Delay: ${RETRY_DELAY}s"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo ""
            echo "--- Attempt $attempt of $MAX_RETRIES ---"

            HTTP_STATUS=$(curl \
              --silent \
              --output /dev/null \
              --write-out "%{http_code}" \
              --max-time 45 \
              --connect-timeout 20 \
              "$HEALTH_URL" || true)

            echo "📡 HTTP Status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 401 ]; then
              echo "✅ Server is alive! (HTTP $HTTP_STATUS)"
              SUCCESS=true
              break
            else
              echo "⚠️  Non-200 response. Server may still be booting..."
              if [ "$attempt" -lt "$MAX_RETRIES" ]; then
                echo "⏳ Waiting ${RETRY_DELAY}s before next attempt..."
                sleep $RETRY_DELAY
              fi
            fi
          done

          if [ "$SUCCESS" = false ]; then
            echo ""
            echo "❌ All $MAX_RETRIES attempts failed. Last HTTP status: $HTTP_STATUS"
            exit 1
          fi

